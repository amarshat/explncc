name: release

# Tag-driven releases: push a tag like v0.1.0 and this builds standalone
# one-file binaries for five targets, smoke-tests each one against real
# fixtures, and publishes them (plus SHA256SUMS) as a GitHub Release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag matches pyproject and __init__ versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(python -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('src/explncc/__init__.py').read()).group(1))")
          echo "tag=$TAG pyproject=$PYPROJECT __init__=$INIT"
          test "$TAG" = "$PYPROJECT"
          test "$TAG" = "$INIT"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest -q

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
          - os: windows-2022
            target: windows-x86_64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install ".[package]"
      - name: Build one-file binary
        run: >
          python -m PyInstaller --onefile --name explncc --clean --noconfirm
          --paths src --log-level WARN packaging/pyinstaller_entry.py
      - name: Smoke test the binary
        shell: bash
        run: |
          BIN="dist/explncc${{ matrix.ext }}"
          "$BIN" --version
          "$BIN" summary tests/fixtures/fusion/hot.opt.yaml --limit 3
          "$BIN" why tests/fixtures/fusion/hot.opt.yaml --top 1
          "$BIN" why examples/ema-demo/ema_csynth.xml --toolchain hls
          "$BIN" explain tests/fixtures/fusion/hot.opt.yaml --backend rule --kind missed
      - name: Rename for release
        shell: bash
        run: |
          mv "dist/explncc${{ matrix.ext }}" \
             "dist/explncc-${GITHUB_REF_NAME}-${{ matrix.target }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: explncc-${{ matrix.target }}
          path: dist/explncc-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true
      - name: Checksums
        run: |
          cd binaries
          sha256sum explncc-* > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
