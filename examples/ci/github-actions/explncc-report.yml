# GitHub Actions — optimization remark report (Chapter 12)
#
# Copy to .github/workflows/. No model backend by default.
# Book: Compiler Optimization CI Feedback Loop

name: explncc report

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  optimization-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPT_YAML: ${{ github.workspace }}/tests/fixtures/inline_miss_no_definition.opt.yaml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install explncc
        run: pip install .

      - name: Markdown job summary
        run: |
          python -m explncc report "$OPT_YAML" \
            --format markdown \
            --top-missed 15 \
            --git-sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --ci-provider github \
            >> "$GITHUB_STEP_SUMMARY"

      - name: JSON dashboard artifact
        run: |
          python -m explncc report "$OPT_YAML" \
            --format json \
            --git-sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --ci-provider github \
            -o report.json \
            --write-manifest manifest.json

      - name: PR comment body (artifact only)
        if: github.event_name == 'pull_request'
        run: |
          python -m explncc report "$OPT_YAML" \
            --format github \
            --top-missed 12 \
            --git-sha "${{ github.sha }}" \
            -o pr-comment.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: explncc-reports
          path: |
            report.json
            manifest.json
            pr-comment.md
          if-no-files-found: ignore
